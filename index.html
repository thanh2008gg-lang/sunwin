<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tài Xỉu 3D SUPER</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    overflow:hidden;
    background: radial-gradient(circle,#1a1a1a,#000);
    font-family: Arial;
    color:white;
}

#top{
    position:absolute;
    width:100%;
    text-align:center;
    top:10px;
    color:gold;
    font-size:22px;
}

#score{
    position:absolute;
    top:50px;
    width:100%;
    text-align:center;
    color:lime;
}

#result{
    position:absolute;
    top:80px;
    width:100%;
    text-align:center;
}

button{
    position:absolute;
    padding:12px 20px;
    border:none;
    border-radius:10px;
}

#tai{ left:20%; bottom:100px; background:green; color:white; }
#xiu{ right:20%; bottom:100px; background:red; color:white; }

#roll{
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    background:gold;
}
</style>
</head>

<body>

<div id="top">🎲 Tài Xỉu 3D SUPER</div>
<div id="score"></div>
<div id="result"></div>

<button id="tai" onclick="choose('tai')">TÀI</button>
<button id="xiu" onclick="choose('xiu')">XỈU</button>
<button id="roll" onclick="roll()">LẮC</button>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"></script>

<script>
// THREE
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
camera.position.set(0,5,8);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
scene.add(new THREE.AmbientLight(0xffffff,1.2));
let light = new THREE.PointLight(0xffffff,1.5);
light.position.set(5,10,5);
scene.add(light);

// FLOOR
let floorGeo = new THREE.PlaneGeometry(20,20);
let floorMat = new THREE.MeshStandardMaterial({color:0x222222});
let floor = new THREE.Mesh(floorGeo,floorMat);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// PHYSICS
const world = new CANNON.World();
world.gravity.set(0,-9.82,0);

// ground body
const groundBody = new CANNON.Body({ mass:0 });
groundBody.addShape(new CANNON.Plane());
groundBody.quaternion.setFromEuler(-Math.PI/2,0,0);
world.addBody(groundBody);

// DICE
function createDice(){
    let geo = new THREE.BoxGeometry(1,1,1);
    let mat = new THREE.MeshStandardMaterial({color:0xffffff});
    let mesh = new THREE.Mesh(geo,mat);
    scene.add(mesh);

    let body = new CANNON.Body({
        mass:1,
        shape:new CANNON.Box(new CANNON.Vec3(0.5,0.5,0.5))
    });
    world.addBody(body);

    return {mesh,body};
}

let dices = [createDice(),createDice(),createDice()];

// GAME
let score = 1000000;
let bet = null;

function update(){
    scoreEl.innerHTML = "💰 "+score;
}
update();

function choose(type){
    bet = type;
    result.innerHTML = "Chọn: "+type;
}

function roll(){
    if(!bet){
        alert("Chọn Tài/Xỉu!");
        return;
    }

    dices.forEach((d,i)=>{
        d.body.position.set(i-1,5,0);
        d.body.velocity.set(
            (Math.random()-0.5)*5,
            5,
            (Math.random()-0.5)*5
        );
        d.body.angularVelocity.set(
            Math.random()*5,
            Math.random()*5,
            Math.random()*5
        );
    });

    setTimeout(()=>{
        let total = 0;
        dices.forEach(()=> total += Math.floor(Math.random()*6)+1);

        let outcome = total>=11 ? "tai":"xiu";

        if(outcome===bet){
            score += 100000;
            result.innerHTML = "🎉 Thắng "+total;
        }else{
            score -= 100000;
            result.innerHTML = "💀 Thua "+total;
        }
        update();
    },2000);
}

// LOOP
function animate(){
    requestAnimationFrame(animate);
    world.step(1/60);

    dices.forEach(d=>{
        d.mesh.position.copy(d.body.position);
        d.mesh.quaternion.copy(d.body.quaternion);
    });

    renderer.render(scene,camera);
}
animate();

// resize
addEventListener('resize',()=>{
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
