<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tài Xỉu 3D MAX</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    overflow:hidden;
    background: radial-gradient(circle,#000,#111);
    font-family: Arial;
    color:white;
}

/* UI */
#top{
    position:absolute;
    width:100%;
    text-align:center;
    top:10px;
    color:gold;
    font-size:22px;
    text-shadow:0 0 10px gold;
}

#score{
    position:absolute;
    top:50px;
    width:100%;
    text-align:center;
    color:lime;
    font-size:20px;
}

#result{
    position:absolute;
    top:80px;
    width:100%;
    text-align:center;
    font-size:20px;
}

/* Buttons */
.btn{
    position:absolute;
    bottom:100px;
    padding:12px 25px;
    border:none;
    border-radius:10px;
    font-size:16px;
    color:white;
}

#tai{ left:20%; background:green; }
#xiu{ right:20%; background:red; }

#roll{
    position:absolute;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    padding:15px 30px;
    background:gold;
    border:none;
    border-radius:12px;
    font-size:18px;
}
</style>
</head>

<body>

<div id="top">🎲 Tài Xỉu 3D MAX</div>
<div id="score"></div>
<div id="result"></div>

<button id="tai" class="btn" onclick="choose('tai')">TÀI</button>
<button id="xiu" class="btn" onclick="choose('xiu')">XỈU</button>
<button id="roll" onclick="rollDice()">LẮC</button>

<!-- Âm thanh -->
<audio id="rollSound" src="https://www.soundjay.com/misc/sounds/dice-roll-1.mp3"></audio>
<audio id="winSound" src="https://www.soundjay.com/buttons/sounds/button-4.mp3"></audio>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>
// SCENE
const scene = new THREE.Scene();

// CAMERA
const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
camera.position.z = 7;

// RENDER
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
const light1 = new THREE.PointLight(0xffffff,1);
light1.position.set(5,5,5);
scene.add(light1);

const light2 = new THREE.PointLight(0xffd700,1);
light2.position.set(-5,-5,5);
scene.add(light2);

// CREATE DICE TEXTURE (hiện số)
function createNumberTexture(num){
    const canvas = document.createElement("canvas");
    canvas.width = 256;
    canvas.height = 256;
    const ctx = canvas.getContext("2d");

    ctx.fillStyle = "white";
    ctx.fillRect(0,0,256,256);

    ctx.fillStyle = "black";
    ctx.font = "bold 150px Arial";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(num,128,140);

    return new THREE.CanvasTexture(canvas);
}

// CREATE DICE
function createDice(){
    let materials = [];
    for(let i=1;i<=6;i++){
        materials.push(new THREE.MeshStandardMaterial({
            map:createNumberTexture(i)
        }));
    }
    let geo = new THREE.BoxGeometry();
    return new THREE.Mesh(geo,materials);
}

const dice = [];
for(let i=0;i<3;i++){
    let cube = createDice();
    cube.position.x = (i-1)*2;
    scene.add(cube);
    dice.push(cube);
}

// ANIMATE
function animate(){
    requestAnimationFrame(animate);
    renderer.render(scene,camera);
}
animate();

// GAME
let score = 1000000;
let bet = null;

function updateUI(){
    scoreEl.innerHTML = "💰 Điểm: " + score.toLocaleString();
}
updateUI();

function choose(type){
    bet = type;
    result.innerHTML = "Bạn chọn: " + (type=="tai"?"TÀI":"XỈU");
}

function rollDice(){
    if(!bet){
        alert("Chọn Tài/Xỉu!");
        return;
    }

    rollSound.play();

    // camera zoom + rung nhẹ
    camera.position.z = 5;
    setTimeout(()=>camera.position.z = 7,300);

    let total = 0;

    dice.forEach(d=>{
        let val = Math.floor(Math.random()*6)+1;
        total += val;

        d.rotation.x = Math.random()*Math.PI*4;
        d.rotation.y = Math.random()*Math.PI*4;
    });

    let outcome = total>=11 ? "tai":"xiu";

    setTimeout(()=>{
        if(outcome===bet){
            score += 100000;
            winSound.play();
            result.innerHTML = "🎉 Thắng! Tổng: " + total;
        }else{
            score -= 100000;
            result.innerHTML = "💀 Thua! Tổng: " + total;
        }
        updateUI();
    },800);
}

// RESIZE
addEventListener('resize',()=>{
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
